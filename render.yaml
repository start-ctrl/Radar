# Render Blueprint - Deploy backend with one click
# See: https://render.com/docs/blueprint-spec

databases:
  - name: radar-db
    databaseName: radar
    plan: free

services:
  - type: web
    runtime: python
    name: radar-backend
    rootDir: backend
    plan: free

    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /api/health

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: radar-db
          property: connectionString
      - key: APOLLO_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: BASIC_AUTH_USERNAME
        value: admin
      - key: BASIC_AUTH_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: CORS_ORIGINS
        sync: false
